baseURL = 'https://emad.blog/'
languageCode = 'en-us'
title = "Emad's Blog"
theme = 'PaperMod'

[params]
  customCSS = ["css/custom.css", "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"]

  enableStaticFileDeploy = true


[params.assets]
  favicon = "favicon.ico"

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1
  pre = "<i class='fas fa-home' style='font-family: FontAwesome;'></i>&nbsp;"

[[menu.main]]
  name = "Blog"
  url = "/blog/"
  weight = 2
  pre = "<i class='fas fa-folder' style='font-family: FontAwesome;'></i>&nbsp;"

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 3
  pre = "<i class='fas fa-heart' style='font-family: FontAwesome;'></i>&nbsp;"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true