baseURL = 'https://emad.blog'
languageCode = 'en-us'
title = "Emad's Blog"
theme = 'PaperMod'

[params]
  customCSS = ["css/custom.css"]  # Add this line to load custom CSS

[params.assets]
  favicon = "favicon.ico"

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1
  pre = "<i class='fas fa-home'></i>&nbsp;"

[[menu.main]]
  name = "Blog"
  url = "/blog/"
  weight = 2
  pre = "<i class='fas fa-folder'></i>&nbsp;"

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 3
  pre = "<i class='fas fa-heart'></i>&nbsp;"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true